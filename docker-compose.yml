services:
  takumi-bot:
    build: .
    image: takumi-bot:latest
    container_name: takumi-bot
    restart: unless-stopped

    env_file:
      - .env
    # DISCORD_GUILD_ID を設定するとスラッシュコマンドがそのサーバーに即時反映される（推奨）
    # 未設定の場合はグローバル sync（最大1時間かかる）
    # environment:
    #   - DISCORD_GUILD_ID=123456789012345678

    volumes:
      # job workspaces を永続化（コンテナ再起動後も job 状態が残る）
      - ./takumi/jobs:/app/takumi/jobs
      # inbox: ユーザーとのファイル受け渡し場所
      # Bot が .auth_code 等を書き込むこともあるため ro は外す
      - ./inbox:/app/inbox
      # Claude Code 認証情報を named volume で永続化
      # 初回起動時に Bot が Discord へ認証URLを送信するので、そこから認証する
      - claude_auth:/root/.claude

    # ログをローテーションする
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  claude_auth:
    # Docker が管理する named volume（コンテナ再起動後も認証状態が保持される）
